    <!-- ===== LOADING OVERLAY ===== -->
    <div id="overlay">
        <div id="progstat"></div>
        <div id="progress"></div>
        <button id="getInBtn" onclick="enterSite()">
            <span class="get-in-heart">♥</span> Get In
        </button>
    </div>

    <div class="box">
        <div class="about">
            <div class="info">
                <img src="img/crazyman.JPEG" class="avatar">
                <div class="details">
                    <p class="name"><a target="_blank" href="https://instagram.com/vu.binh_127?igshid=YmMyMTA2M2Y=">Crazy Man ♥</a></p>
                    <p class="born">12.07.2000</p>
                </div>
            </div>

            <div class="heart-box">
                <img src="img/hearts.svg" class="heart">
            </div>

            <div class="info">
                <img src="img/crazymedicine.JPEG" class="avatar">
                <div class="details">
                    <p class="name"><a target="_blank" href="https://instagram.com/real_vanhh?igshid=YmMyMTA2M2Y=">Crazy Medicine ♥</a></p>
                    <p class="born">16.05.2002</p>
                </div>
            </div>
        </div>

        <div class="time">
            <h1 class="title">BEEN TOGETHER</h1>
            <h2 class="days"><span>00</span>&nbsp;DAYS</h2>
            <div class="ymd-cards">
                <div class="ymd-card">
                    <span class="years">0</span>
                    <span class="ymd-label">NĂM</span>
                </div>
                <div class="ymd-card">
                    <span class="months">0</span>
                    <span class="ymd-label">THÁNG</span>
                </div>
                <div class="ymd-card">
                    <span class="weeks">0</span>
                    <span class="ymd-label">TUẦN</span>
                </div>
                <div class="ymd-card">
                    <span class="ddays">0</span>
                    <span class="ymd-label">NGÀY</span>
                </div>
            </div>
            <p class="sup-time">
                <span class="hour">10</span>:<span class="min">20</span>:<span class="second">16</span>
            </p>
        </div>

        <p class="say-thank">Thank you for your love !</p>

        <!-- ===== VISUALIZER ===== -->
        <canvas id="vizCanvas" class="viz-canvas"></canvas>

        <audio id="bgAudio" src="music/a_song.mp3" loop preload="auto"></audio>

    </div>
